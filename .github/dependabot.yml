version: 2
updates:
  # npm dependencies — monthly, grouped, no majors
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      patches:
        update-types:
          - patch
      minors:
        update-types:
          - minor
    ignore:
      # Skip major version bumps — they usually need migration work.
      # Review and bump these manually when the maintainers ship breaking changes.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions — monthly, no majors
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
