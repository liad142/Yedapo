version: 2
updates:
  # npm dependencies — weekly, grouped to avoid PR spam
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      next-ecosystem:
        patterns:
          - next
          - "@next/*"
          - react
          - react-dom
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      vercel:
        patterns:
          - "@vercel/*"
      dev-dependencies:
        dependency-type: development

  # GitHub Actions — monthly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
