name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-output.txt
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_POSTHOG_KEY: placeholder

      - name: Show build errors
        if: failure()
        run: |
          echo "::group::Last 80 lines of build output"
          tail -80 build-output.txt 2>/dev/null || echo "No build output captured"
          echo "::endgroup::"
